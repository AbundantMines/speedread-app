<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warpreader</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">⚡ Warp<span>reader</span></div>
  <div class="header-right">
    <div class="account-btn" id="account-btn" title="Account">
      <div class="avatar anon" id="avatar-initial">?</div>
      <span class="plan-badge" id="plan-badge">FREE</span>
    </div>
  </div>
</div>

<!-- Auth Panel (toggle) -->
<div class="auth-panel" id="auth-panel">
  <!-- Not signed in -->
  <div id="auth-form-wrap">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-field"><input type="email" id="auth-email" placeholder="Email" autocomplete="email"></div>
    <div class="auth-field"><input type="password" id="auth-password" placeholder="Password" autocomplete="current-password"></div>
    <button class="auth-submit" id="auth-submit-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
  <!-- Signed in -->
  <div id="signed-in-wrap" style="display:none">
    <div class="signed-in-panel">
      <div class="user-info">
        <span class="user-email" id="user-email-display">user@example.com</span>
        <span>Signed in</span>
      </div>
      <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>
</div>

<!-- Limit banner -->
<div class="limit-banner" id="limit-banner">
  <p>🔒 Daily free limit reached (3 articles). Go Pro for unlimited.</p>
  <button class="upgrade-btn" onclick="openUpgrade()">Upgrade to Pro</button>
</div>

<!-- RSVP Area -->
<div class="rsvp-area">
  <div class="rsvp-window">
    <div class="word-row" id="word-row" style="display:none">
      <span class="word-before" id="word-before"></span>
      <span class="word-orp" id="word-orp"></span>
      <span class="word-after" id="word-after"></span>
    </div>
    <div class="idle-text" id="idle-text">Extract a page to begin reading</div>
  </div>

  <div class="progress-wrap">
    <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-info">
      <span id="progress-pos">0 / 0 words</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-sm" id="btn-back50" title="Back 50">⏮</button>
    <button class="btn btn-sm" id="btn-back10" title="Back 10">◄</button>
    <button class="btn btn-play" id="play-btn">▶ Play</button>
    <button class="btn btn-sm" id="btn-fwd10" title="Forward 10">►</button>
    <button class="btn btn-sm" id="btn-fwd50" title="Forward 50">⏭</button>
  </div>

  <div class="wpm-row">
    <label>WPM</label>
    <input type="range" id="wpm-slider" min="100" max="1500" step="25" value="300">
    <span class="wpm-val" id="wpm-val">300</span>
  </div>
</div>

<!-- Bottom: source buttons + sparkline -->
<div class="bottom-section">
  <div class="source-row">
    <button class="btn btn-sm" id="btn-extract">📄 Extract Page</button>
    <button class="btn btn-sm" id="btn-selection">✂️ Selection</button>
    <button class="btn btn-sm" id="btn-fullreader">⬛ Full Reader</button>
  </div>

  <div class="sparkline-wrap" id="sparkline-wrap" style="display:none">
    <span class="sparkline-label">WPM History</span>
    <svg id="sparkline-svg" viewBox="0 0 380 36" preserveAspectRatio="none"></svg>
  </div>
</div>

<div class="kbd-hint">
  <span><kbd>Space</kbd> play/pause</span>
  <span><kbd>←/→</kbd> jump</span>
  <span><kbd>↑/↓</kbd> speed</span>
</div>

<button class="open-app" id="btn-open-app">Open in Warpreader app →</button>

<script src="lib/supabase.min.js"></script>
<script src="lib/auth.js"></script>
<script src="popup.js"></script>
</body>
</html>
